{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="mb-3"><a href="{% url 'dashboard' %}" class="text-muted text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
    <div class="card p-4">
      <h5 class="fw-bold mb-1"><i class="bi bi-file-earmark-plus me-2 text-primary"></i>Create Invoice</h5>
      <p class="text-muted mb-4" style="font-size:.88rem;">Fill in the details below</p>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Client Name</label>
          <input type="text" name="client" class="form-control" placeholder="e.g. John Smith Ltd" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description of Work</label>
          <textarea name="description" class="form-control" rows="3" placeholder="e.g. Website redesign — March 2026" required></textarea>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Amount (£)</label>
          <div class="input-group">
            <span class="input-group-text bg-light">£</span>
            <input type="number" name="amount" class="form-control" placeholder="0.00" step="0.01" min="0" required>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-blue px-4">Create Invoice</button>
          <a href="{% url 'dashboard' %}" class="btn btn-light px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
