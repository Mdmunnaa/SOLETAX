{% extends 'core/base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-4"><i class="bi bi-wallet2 me-2" style="color:#4cc9f0;"></i>Add Expense</h5>
        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <input type="text" name="description" class="form-control" placeholder="e.g. Adobe Subscription" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">HMRC Category</label>
            <select name="category" class="form-select" required>
              <option value="">Select category...</option>
              {% for value, label in categories %}
              <option value="{{ value }}">{{ label }}</option>
              {% endfor %}
            </select>
            <small class="text-muted">Official HMRC expense categories for sole traders.</small>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Amount (£)</label>
            <div class="input-group">
              <span class="input-group-text">£</span>
              <input type="number" name="amount" class="form-control" placeholder="0.00" step="0.01" min="0" required>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">Add Expense</button>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
