{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="mb-3"><a href="{% url 'dashboard' %}" class="text-muted text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Back</a></div>
    <div class="card p-4">
      <h5 class="fw-bold mb-1"><i class="bi bi-plus-circle me-2 text-danger"></i>Add Expense</h5>
      <p class="text-muted mb-4" style="font-size:.88rem;">Log a business expense</p>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <input type="text" name="description" class="form-control" placeholder="e.g. Adobe Creative Cloud" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">HMRC Category</label>
          <select name="category" class="form-select" required>
            <option value="">Select category...</option>
            {% for value, label in categories %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
          </select>
          <small class="text-muted">Official HMRC categories for UK sole traders</small>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Amount (£)</label>
          <div class="input-group">
            <span class="input-group-text bg-light">£</span>
            <input type="number" name="amount" class="form-control" placeholder="0.00" step="0.01" min="0" required>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-blue px-4">Add Expense</button>
          <a href="{% url 'dashboard' %}" class="btn btn-light px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
