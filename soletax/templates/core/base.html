<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SoleTax</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --dark: #1a1a2e;
      --accent: #4cc9f0;
      --accent2: #7b2fff;
    }
    body { background: #f0f2f8; font-family: 'Segoe UI', sans-serif; }

    /* Navbar */
    .navbar { background: var(--dark); padding: .8rem 1.5rem; box-shadow: 0 2px 20px rgba(0,0,0,.3); }
    .navbar-brand { color: #fff !important; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.5px; }
    .navbar-brand span { color: var(--accent); }

    /* Sidebar */
    .sidebar { background: var(--dark); min-height: 100vh; padding: 1.5rem .75rem; width: 220px; position: fixed; top: 56px; left: 0; }
    .sidebar .nav-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: .1em; padding: .5rem .75rem; margin-top: .5rem; }
    .sidebar a { color: #8a8fa8; text-decoration: none; display: flex; align-items: center; gap: 10px; padding: .6rem .75rem; border-radius: 10px; margin-bottom: 2px; font-size: .9rem; transition: all .2s; }
    .sidebar a:hover, .sidebar a.active { background: rgba(76,201,240,.12); color: var(--accent); }
    .sidebar a i { font-size: 1rem; width: 20px; }

    /* Main */
    .main-content { margin-left: 220px; padding: 2rem; padding-top: calc(56px + 2rem); min-height: 100vh; }

    /* Cards */
    .card { border: none; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,.06); }
    .card-header-custom { background: linear-gradient(135deg, var(--dark), #16213e); color: white; border-radius: 16px 16px 0 0 !important; padding: 1rem 1.5rem; }

    /* Stat cards */
    .stat-card { border-radius: 16px; padding: 1.5rem; color: white; position: relative; overflow: hidden; }
    .stat-card::after { content: ''; position: absolute; right: -20px; top: -20px; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,.08); }
    .stat-card .label { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; opacity: .75; margin-bottom: .4rem; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; }

    /* Badges */
    .badge-paid { background: #d1fae5; color: #065f46; border-radius: 20px; padding: 4px 12px; font-size: .78rem; font-weight: 600; }
    .badge-unpaid { background: #fee2e2; color: #991b1b; border-radius: 20px; padding: 4px 12px; font-size: .78rem; font-weight: 600; }

    /* Buttons */
    .btn-primary { background: var(--dark); border: none; border-radius: 10px; }
    .btn-primary:hover { background: var(--accent); color: var(--dark) !important; }
    .btn-accent { background: var(--accent); color: var(--dark); border: none; border-radius: 10px; font-weight: 600; }
    .btn-accent:hover { background: #3ab8dd; color: var(--dark); }

    /* Table */
    .table th { font-size: .78rem; text-transform: uppercase; letter-spacing: .06em; color: #888; border-bottom: 2px solid #eee; }
    .table td { vertical-align: middle; font-size: .9rem; }

    /* Page title */
    .page-title { font-size: 1.5rem; font-weight: 700; color: var(--dark); margin-bottom: 1.5rem; }
  </style>
</head>
<body>

<nav class="navbar fixed-top">
  <a class="navbar-brand" href="{% url 'index' %}"><i class="bi bi-receipt-cutoff me-2" style="color:var(--accent)"></i>Sole<span>Tax</span></a>
  <div class="ms-auto d-flex gap-2 align-items-center">
    {% if user.is_authenticated %}
      <span class="text-white-50 small me-1"><i class="bi bi-person-circle me-1"></i>{{ user.username }}</span>
      <a href="{% url 'create_invoice' %}" class="btn btn-sm btn-outline-light rounded-pill px-3">+ Invoice</a>
      <a href="{% url 'add_expense' %}" class="btn btn-sm btn-accent rounded-pill px-3">+ Expense</a>
      <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-danger rounded-pill px-3">Logout</a>
    {% else %}
      <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light rounded-pill px-3">Login</a>
      <a href="{% url 'signup' %}" class="btn btn-sm btn-accent rounded-pill px-3">Sign Up Free</a>
    {% endif %}
  </div>
</nav>

{% if user.is_authenticated %}
<div class="sidebar d-none d-md-block">
  <p class="nav-label">Menu</p>
  <a href="{% url 'dashboard' %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a href="{% url 'create_invoice' %}"><i class="bi bi-file-earmark-text"></i> New Invoice</a>
  <a href="{% url 'add_expense' %}"><i class="bi bi-wallet2"></i> Add Expense</a>
  <a href="{% url 'tax_report' %}"><i class="bi bi-bar-chart-line"></i> Tax Report</a>
</div>
{% endif %}

<div class="{% if user.is_authenticated %}main-content{% else %}container py-5 mt-5{% endif %}">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
