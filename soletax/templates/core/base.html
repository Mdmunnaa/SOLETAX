<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SoleTax</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #1a1a2e; }
    .navbar-brand { color: #fff !important; font-weight: 700; font-size: 1.4rem; }
    .navbar-brand span { color: #4cc9f0; }
    .nav-link { color: #ccc !important; }
    .nav-link:hover { color: #fff !important; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .btn-primary { background: #1a1a2e; border: none; border-radius: 8px; }
    .btn-primary:hover { background: #4cc9f0; color: #fff; }
    .stat-card { border-radius: 12px; padding: 1.5rem; color: white; }
    .badge-paid { background: #d1fae5; color: #065f46; border-radius: 6px; padding: 4px 10px; font-size: .8rem; }
    .badge-unpaid { background: #fee2e2; color: #991b1b; border-radius: 6px; padding: 4px 10px; font-size: .8rem; }
    .sidebar { background: #1a1a2e; min-height: 100vh; padding-top: 1rem; }
    .sidebar a { color: #ccc; text-decoration: none; display: block; padding: .6rem 1.2rem; border-radius: 8px; margin: 2px 8px; }
    .sidebar a:hover { background: #4cc9f0; color: #fff; }
    .sidebar i { margin-right: 8px; }
    .main-content { padding: 2rem; }
  </style>
</head>
<body>
<nav class="navbar px-4">
  <a class="navbar-brand" href="{% url 'index' %}">
    <i class="bi bi-receipt-cutoff me-2"></i>Sole<span>Tax</span>
  </a>
  <div class="ms-auto d-flex gap-2 align-items-center">
    {% if user.is_authenticated %}
      <span class="text-white-50 small me-2">Hi, {{ user.username }}</span>
      <a href="{% url 'create_invoice' %}" class="btn btn-sm btn-outline-light">+ Invoice</a>
      <a href="{% url 'add_expense' %}" class="btn btn-sm" style="background:#4cc9f0;color:#fff;">+ Expense</a>
      <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-danger">Logout</a>
    {% else %}
      <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light">Login</a>
      <a href="{% url 'signup' %}" class="btn btn-sm" style="background:#4cc9f0;color:#fff;">Sign Up Free</a>
    {% endif %}
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    {% if user.is_authenticated %}
    <div class="col-md-2 sidebar d-none d-md-block">
      <a href="{% url 'dashboard' %}" class="mt-3"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="{% url 'create_invoice' %}"><i class="bi bi-file-earmark-text"></i> Invoices</a>
      <a href="{% url 'add_expense' %}"><i class="bi bi-wallet2"></i> Expenses</a>
      <a href="{% url 'tax_report' %}"><i class="bi bi-bar-chart-line"></i> Tax Report</a>
    </div>
    <div class="col-md-10 main-content">
    {% else %}
    <div class="col-12 main-content">
    {% endif %}
      {% block content %}{% endblock %}
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
