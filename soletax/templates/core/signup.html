{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center mt-3">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <h2 class="fw-bold">Create account</h2>
      <p class="text-muted">Free to start. No credit card needed.</p>
    </div>
    <div class="card p-4">
      <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:.88rem;">{{ field.label }}</label>
          <input type="{{ field.field.widget.input_type }}"
                 name="{{ field.html_name }}"
                 class="form-control {% if field.errors %}is-invalid{% endif %}"
                 {% if field.value %}value="{{ field.value }}"{% endif %}>
          {% for error in field.errors %}
          <div class="invalid-feedback">{{ error }}</div>
          {% endfor %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-blue w-100 py-2 mt-1">Create Account</button>
      </form>
      <p class="text-center mt-3 mb-0 text-muted" style="font-size:.85rem;">
        Already have an account? <a href="{% url 'login' %}">Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
