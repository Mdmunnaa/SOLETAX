{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="mb-3"><a href="{% url 'index' %}" class="text-muted text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Home</a></div>
    <h2 class="fw-bold mb-2">Contact Us</h2>
    <p class="text-muted mb-5">We'd love to hear from you. We usually respond within 24 hours.</p>
    <div class="row g-4 mb-5">
      <div class="col-md-4">
        <div class="card p-3 text-center">
          <i class="bi bi-envelope-fill text-primary mb-2" style="font-size:1.5rem;"></i>
          <h6 class="fw-bold mb-1">Email Us</h6>
          <a href="mailto:support@soletax.co.uk" class="text-muted" style="font-size:.85rem;">support@soletax.co.uk</a>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-3 text-center">
          <i class="bi bi-chat-dots-fill text-primary mb-2" style="font-size:1.5rem;"></i>
          <h6 class="fw-bold mb-1">Response Time</h6>
          <p class="text-muted mb-0" style="font-size:.85rem;">Within 24 hours</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-3 text-center">
          <i class="bi bi-clock-fill text-primary mb-2" style="font-size:1.5rem;"></i>
          <h6 class="fw-bold mb-1">Support Hours</h6>
          <p class="text-muted mb-0" style="font-size:.85rem;">Mon–Fri, 9am–6pm GMT</p>
        </div>
      </div>
    </div>
    <div class="card p-4">
      <h5 class="fw-bold mb-4">Send us a message</h5>
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:.88rem;">Your Name</label>
        <input type="text" class="form-control" placeholder="John Smith">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:.88rem;">Email Address</label>
        <input type="email" class="form-control" placeholder="john@example.com">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:.88rem;">Subject</label>
        <select class="form-select">
          <option>General question</option>
          <option>Billing issue</option>
          <option>Technical support</option>
          <option>Feature request</option>
          <option>Other</option>
        </select>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" style="font-size:.88rem;">Message</label>
        <textarea class="form-control" rows="4" placeholder="Tell us how we can help..."></textarea>
      </div>
      <button class="btn btn-blue px-4">Send Message</button>
    </div>
  </div>
</div>
{% endblock %}
